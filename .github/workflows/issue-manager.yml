name: Issue Manager

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight
  issues:
    types: [opened, reopened]

jobs:
  close-stale-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check for stale issues
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: 'This issue has been marked stale because it has been inactive for 30 days. It will stay open so maintainers can still triage YouTube/API regressions when time allows.'
          stale-issue-label: 'stale'
          days-before-stale: 30
          days-before-close: -1
          exempt-issue-labels: 'pinned,help-wanted'
          only-issue-labels: ''
          operations-per-run: 30
