name: Publish Package

on:
  push:
    tags:
      - 'v*'

env:
  PACKAGE_NAME: '@sinco-lab/mcp-youtube-transcript'

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.package.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - name: Read package version
        id: package
        run: |
          version=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - run: npm ci
      - run: npm test

  publish-gpr:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    env:
      PACKAGE_VERSION: ${{ needs.test.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@sinco-lab'
          cache: 'npm'
      - run: npm ci
      - name: Check GitHub Packages version
        id: published
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: |
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to GitHub Packages
        if: steps.published.outputs.exists != 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
      - name: Skip GitHub Packages publish
        if: steps.published.outputs.exists == 'true'
        run: echo "$PACKAGE_NAME@$PACKAGE_VERSION already exists on GitHub Packages; skipping."

  publish-npm:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    env:
      PACKAGE_VERSION: ${{ needs.test.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          scope: '@sinco-lab'
          cache: 'npm'
      - run: npm ci
      - name: Check npm version
        id: published
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm
        if: steps.published.outputs.exists != 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Skip npm publish
        if: steps.published.outputs.exists == 'true'
        run: echo "$PACKAGE_NAME@$PACKAGE_VERSION already exists on npm; skipping."
